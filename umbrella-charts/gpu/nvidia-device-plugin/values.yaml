# Values passed to the upstream nvidia-device-plugin subchart.
# On WSL2 the GPU is exposed via GPU-PV; the plugin advertises `nvidia.com/gpu` to the scheduler
# once the NVIDIA container runtime is the default runtime in k3s.
nvidia-device-plugin:
  # The plugin only needs to run on nodes that actually have an NVIDIA GPU.
  # On a single-node WSL2 workstation this is a no-op, but it keeps the DaemonSet honest.
  runtimeClassName: nvidia
  # On WSL2 the GPU is paravirtualised (GPU-PV) and is NOT enumerated as a PCI 10de device, so the
  # chart's default nodeAffinity (which relies on NFD/GFD labels that never get set here) keeps the
  # DaemonSet at zero replicas. This single node is known to have the GPU, so replace the affinity
  # with one that matches any Linux node and let the plugin detect the GPU through NVML at runtime.
  # (An empty map would be ignored: Helm coalesce keeps the non-empty chart default.)
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
