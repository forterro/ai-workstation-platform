{{- if .Values.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-exporter-dashboard
  labels:
    # Picked up automatically by the Grafana dashboard sidecar (searchNamespace: ALL).
    grafana_dashboard: "1"
  annotations:
    # Places the dashboard in a dedicated Grafana folder (sidecar folderAnnotation).
    grafana_folder: "GPU"
data:
  dcgm-exporter.json: |-
{{ .Files.Get "dashboards/dcgm-exporter.json" | indent 4 }}
{{- end }}
