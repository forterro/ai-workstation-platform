apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  labels:
    app.kubernetes.io/name: librechat
data:
  librechat.yaml: |
    version: 1.2.8
    cache: true
    endpoints:
      custom:
        - name: "Ollama"
          # Ollama ignores the API key but LibreChat requires a non-empty value.
          apiKey: "ollama"
          baseURL: {{ .Values.ollama.baseURL | quote }}
          models:
            default:
              {{- range .Values.ollama.models }}
              - {{ . | quote }}
              {{- end }}
            fetch: true
          titleConvo: true
          titleModel: {{ .Values.ollama.titleModel | quote }}
          modelDisplayLabel: "Ollama"
