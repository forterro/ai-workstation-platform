# LibreChat + MongoDB. The librechat.yaml (endpoints, MCP servers, model specs) is
# supplied per workstation through values/librechat.yaml; see configYaml below.

librechat:
  image:
    repository: ghcr.io/danny-avila/librechat
    # renovate: datasource=docker depName=ghcr.io/danny-avila/librechat
    tag: v0.8.7
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3080
  # Non-secret runtime configuration (rendered into a ConfigMap and injected via
  # envFrom). Secret values (CREDS_*/JWT_*) come from the `secretName` below,
  # which is provided by the separate KSOPS-decrypted `librechat-secrets` app.
  env:
    HOST: "0.0.0.0"
    PORT: "3080"
    MONGO_URI: "mongodb://librechat-mongodb:27017/LibreChat"
    CONFIG_PATH: "/app/librechat.yaml"
    ALLOW_REGISTRATION: "true"
    ALLOW_EMAIL_LOGIN: "true"
    # Disable the Meilisearch dependency (not deployed in this MVP).
    SEARCH: "false"
  secretName: librechat-env
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  # Full LibreChat librechat.yaml, injected verbatim into the librechat-config
  # ConfigMap and mounted at /app/librechat.yaml (CONFIG_PATH). The public chart
  # ships only a minimal placeholder: each workstation supplies its endpoints,
  # MCP servers and model specs through values/librechat.yaml in its private repo.
  configYaml: |
    version: 1.2.8
    cache: true

mongodb:
  image:
    repository: mongo
    # renovate: datasource=docker depName=mongo
    tag: "8"
    pullPolicy: IfNotPresent
  persistence:
    size: 8Gi
    # Empty => cluster default StorageClass (local-path on k3s).
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# TLS ingress through Traefik, certificate issued by step-ca via cert-manager.
ingressRoute:
  enabled: true
  host: chat.workstation.internal
  entryPoint: websecure
  issuer: step-ca-acme
