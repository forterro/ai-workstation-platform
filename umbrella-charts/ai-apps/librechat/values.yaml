# LibreChat + MongoDB (KubeBlocks). The librechat.yaml (endpoints, MCP servers, model
# specs) is supplied per workstation through values/librechat.yaml; see configYaml
# below. MongoDB is provisioned as a KubeBlocks Cluster (see `mongo:` below), matching
# the LiteLLM/Postgres pattern; the connection URI (with root credentials) is injected
# via the librechat-env Secret, not the plaintext env ConfigMap.

librechat:
  image:
    repository: ghcr.io/danny-avila/librechat
    # renovate: datasource=docker depName=ghcr.io/danny-avila/librechat
    tag: v0.8.7
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3080
  # Non-secret runtime configuration (rendered into a ConfigMap and injected via
  # envFrom). Secret values (CREDS_*/JWT_*) come from the `secretName` below,
  # which is provided by the separate KSOPS-decrypted `librechat-secrets` app.
  env:
    HOST: "0.0.0.0"
    PORT: "3080"
    # MONGO_URI is NOT set here: with the KubeBlocks MongoDB cluster (see `mongo:`
    # below) the connection string carries the root credentials, so it is supplied
    # as a secret value through the librechat-env Secret (envFrom secretRef), never
    # this ConfigMap. To bring your own unauthenticated Mongo instead, set mongo.enabled
    # to false and define MONGO_URI here.
    CONFIG_PATH: "/app/librechat.yaml"
    ALLOW_REGISTRATION: "true"
    ALLOW_EMAIL_LOGIN: "true"
    # Disable the Meilisearch dependency (not deployed in this MVP).
    SEARCH: "false"
  secretName: librechat-env
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  # Full LibreChat librechat.yaml, injected verbatim into the librechat-config
  # ConfigMap and mounted at /app/librechat.yaml (CONFIG_PATH). The public chart
  # ships only a minimal placeholder: each workstation supplies its endpoints,
  # MCP servers and model specs through values/librechat.yaml in its private repo.
  configYaml: |
    version: 1.2.8
    cache: true

# KubeBlocks MongoDB Cluster backing LibreChat (templates/mongo-cluster.yaml). Requires
# the KubeBlocks operator + the mongodb addon (ClusterDefinition "mongodb") from the
# k3s-workstation-platform layer. KubeBlocks generates the account secret
# "<clusterName>-mongodb-account-root" and the primary (writer) service
# "<clusterName>-mongodb-mongodb" (role=primary). The app's MONGO_URI (in the
# librechat-env Secret) targets that service with directConnection=true.
#
# rootPasswordSecret lets the private repo pin the root password (a Secret with a
# `password` key, KSOPS) so MONGO_URI can be built deterministically; leave it empty to
# let KubeBlocks generate a random password (then read it from the account secret).
# Disable the whole block to bring your own MongoDB (also set MONGO_URI in env above).
mongo:
  enabled: true
  clusterName: librechat-mongo
  # Supported serviceVersion values come from `kubectl get cmpv mongodb`.
  serviceVersion: "7.0.28"
  terminationPolicy: Delete
  replicas: 1
  storageClassName: ""
  storage: 8Gi
  # Secret (KSOPS, private repo) providing the root account password. Must contain a
  # `password` key. Empty => KubeBlocks generates a random password.
  rootPasswordSecret: librechat-mongodb-root
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# TLS ingress through Traefik, certificate issued by step-ca via cert-manager.
ingressRoute:
  enabled: true
  host: chat.workstation.internal
  entryPoint: websecure
  issuer: step-ca-acme
