# LiteLLM: OpenAI-compatible gateway and hybrid router, wrapping the official
# litellm-helm chart. It does NOT serve models; it classifies each request and
# routes it to a backend serving engine.
#
# Everything under `litellm-helm:` configures the upstream subchart. The umbrella
# adds workstation-layer resources of its own (see templates/): a Traefik
# IngressRoute, a step-ca Certificate, a Grafana dashboard ConfigMap and an optional
# KubeBlocks PostgreSQL Cluster (see `postgres:` below).
#
# Do NOT pin the image tag: the upstream chart tracks its own appVersion. Model names
# and any SaaS tier are workstation choices; override litellm-helm.proxy_config from
# the consumer config overlay (values/litellm.yaml), never in this public default.

litellm-helm:
  # Deterministic resource names so the umbrella IngressRoute/Certificate can target
  # the service by a stable name (`litellm`, port 4000).
  fullnameOverride: litellm

  image:
    # Consume the publisher default tag (chart appVersion). Never pin here.
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 4000

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # External Postgres. The official image (litellm-database) runs a Prisma migration
  # on boot, so a reachable database is mandatory. It is provided by the KubeBlocks
  # PostgreSQL Cluster defined under `postgres:` below; wire the connection here.
  # deployStandalone:false keeps the bundled Bitnami postgresql subchart out (Broadcom
  # moved the free Bitnami images to bitnamilegacy and deprecated them).
  db:
    useExisting: true
    deployStandalone: false
    # KubeBlocks primary (writer) service: <cluster>-<component>-<component> selecting
    # kubeblocks.io/role=primary. Component name is `postgresql`, cluster `litellm-pg`.
    endpoint: litellm-pg-postgresql-postgresql.litellm.svc.cluster.local
    # Dedicated database, created by the db-init Job (templates/db-init-job.yaml). Do
    # NOT use the KubeBlocks default `postgres` database: the addon populates it with
    # its own objects (postgres_log foreign tables, audit views) that clash with the
    # proxy's Prisma schema push. A clean database lets Prisma own the whole schema.
    database: litellm
    secret:
      # Connection secret generated by the KubeBlocks Cluster for the postgres account.
      name: litellm-pg-postgresql-account-postgres
      usernameKey: username
      passwordKey: password

  # Admin UI and virtual-key management require a proxy master key. It is provided by
  # the consumer config repo secrets flow as a Secret in this namespace exposing
  # PROXY_MASTER_KEY. The proxy config references it via os.environ/PROXY_MASTER_KEY.
  masterkeySecretName: litellm-secrets
  masterkeySecretKey: PROXY_MASTER_KEY

  # Prometheus Operator ServiceMonitor (monitoring.coreos.com CRDs).
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

  # Prisma schema migration. The upstream Job is annotated as an ArgoCD PreSync hook,
  # which runs BEFORE the umbrella's KubeBlocks Cluster (a normal Sync resource) is
  # created, so it would wait forever on the not-yet-existing connection secret. Keep
  # it disabled: the proxy then runs `prisma db push` itself at boot, retrying until
  # the KubeBlocks Cluster has provisioned its account secret and database.
  migrationJob:
    enabled: false

  # Rendered verbatim as the proxy config.yaml. This is the full working default for
  # the workstation; the consumer overlay replaces this block to change models or add
  # a SaaS escalation tier.
  proxy_config:
    model_list:
      # Local operations model (short, simple, general requests).
      - model_name: ops-local
        litellm_params:
          model: openai/qwen2.5:7b-instruct
          api_base: http://ollama.ollama.svc.cluster.local:11434/v1
          # Ollama ignores the key, but the OpenAI client requires a non-empty value.
          api_key: "ollama"
      # Local coding model (code generation, refactoring, debugging).
      - model_name: coding-local
        litellm_params:
          model: openai/qwen2.5-coder:14b
          api_base: http://ollama.ollama.svc.cluster.local:11434/v1
          api_key: "ollama"
      # Local multilingual embedding model (bge-m3). Not a chat model: it is used only
      # by the `auto` router below for semantic keyword matching so French prompts
      # route like their English equivalents. mode:embedding tells LiteLLM to call the
      # /embeddings endpoint.
      - model_name: embed-local
        litellm_params:
          model: openai/bge-m3
          api_base: http://ollama.ollama.svc.cluster.local:11434/v1
          api_key: "ollama"
        model_info:
          mode: embedding
      # Hybrid router entry: classifies each request and dispatches to a tier.
      - model_name: auto
        litellm_params:
          model: auto_router/complexity_router
          complexity_router_config:
            tiers:
              SIMPLE: ops-local
              MEDIUM: ops-local
              COMPLEX: coding-local
              # No SaaS tier by default: reasoning stays on the local coding model.
              REASONING: coding-local
            default_model: ops-local
            # Deterministic heuristic scorer, used as the fallback classifier when no
            # keyword rule matches. The "llm" classifier needs structured
            # response_format the local Ollama backend lacks, so it errors and falls
            # back on every request; the scorer is the reliable default.
            classifier_type: heuristic
            # Match the keyword rules below by embedding similarity (not just literal
            # substring), so French paraphrases route like their English equivalents.
            # Falls back to the heuristic scorer when nothing scores above
            # match_threshold. Requires the embed-local model above.
            semantic_keyword_matching: true
            embedding_model: embed-local
            match_threshold: 0.5
            # Append French/infra terms to the built-in (English) technical keyword
            # list feeding the scorer's technicalTerms dimension.
            custom_technical_keywords: [kubeblocks, argocd, traefik, metallb, ollama, qdrant, "déploiement", "conteneur", "réseau", "certificat"]
            # Bilingual (FR/EN) utterances per tier. Multiple matches escalate to the
            # highest tier (SIMPLE < MEDIUM < COMPLEX < REASONING).
            keyword_tier_rules:
              - keywords: [hi, hello, thanks, "what is", define, bonjour, merci, "c'est quoi", "définis", "explique simplement", "résume", "traduis"]
                tier: SIMPLE
              - keywords: [function, class, method, refactor, bug, debug, stacktrace, compile, "unit test", regex, python, javascript, typescript, golang, rust, sql, dockerfile, yaml, kubernetes, helm, terraform, "écris une fonction", "corrige ce bug", "refactorise", "débogue", "génère du code", "test unitaire", "écris un script", "erreur de compilation"]
                tier: COMPLEX
              - keywords: [reasoning, prove, "step by step", "analyze in depth", architecture, "trade-off", strategy, rationale, "root cause", optimize, "design decision", raisonne, "étape par étape", "analyse en détail", compromis, stratégie, "cause racine", "décision d'architecture", "compare les approches", "explique en profondeur"]
                tier: REASONING
    litellm_settings:
      drop_params: true
      callbacks: ["prometheus"]
      # Internal ClusterIP service scraped by Prometheus without an API key.
      require_auth_for_metrics_endpoint: false
    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY
      # Persist models/keys/teams in the database so the admin UI can manage them.
      store_model_in_db: true

# KubeBlocks PostgreSQL Cluster backing the proxy (templates/postgres-cluster.yaml).
# Requires the KubeBlocks operator + postgresql addon from the k3s-workstation-platform
# layer. Disable it to bring your own database and only set litellm-helm.db above.
postgres:
  enabled: true
  clusterName: litellm-pg
  # Supported serviceVersion values come from `kubectl get cmpv postgresql`.
  serviceVersion: "17.5.0"
  terminationPolicy: Delete
  # false enables the KubeBlocks postgres-exporter sidecar (Prometheus metrics on
  # http-metrics/9187); the PodMonitor below wires it into the observability stack.
  disableExporter: false
  replicas: 1
  storageClassName: ""
  storage: 8Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Idempotent Job that creates the dedicated `litellm` database inside the KubeBlocks
# Cluster (templates/db-init-job.yaml). KubeBlocks only provisions the default
# `postgres` database, so the proxy's target database (litellm-helm.db.database) must
# be created before the proxy can push its Prisma schema. The Job waits for the server
# via the KubeBlocks account secret and re-runs harmlessly (CREATE DATABASE IF absent).
dbInit:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Prometheus observability. LiteLLM exposes /metrics through the prometheus callback
# (litellm-helm.serviceMonitor above scrapes it). `dashboard` renders the Grafana
# dashboard ConfigMap, auto-loaded by the Grafana sidecar (templates/dashboard.yaml).
monitoring:
  enabled: true
  dashboard:
    enabled: true
  # PodMonitor scraping the KubeBlocks postgres-exporter (requires postgres.disableExporter=false).
  podMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# Traefik IngressRoute + step-ca Certificate exposing the proxy at a stable host name
# (templates/ingressroute.yaml, templates/certificate.yaml), so host clients reach it at
# https://litellm.workstation.internal instead of a port-forward. The host name, entry
# point and issuer belong to the k3s-workstation-platform layer.
ingressRoute:
  enabled: true
  entryPoint: websecure
  host: litellm.workstation.internal
  issuer: step-ca-acme
