{{- if .Values.dbInit.enabled }}
{{- $lh := index .Values "litellm-helm" }}
{{- $db := $lh.db }}
# Creates the dedicated proxy database inside the KubeBlocks Cluster. KubeBlocks only
# provisions the default `postgres` database; the proxy targets a clean database
# ($db.database) so Prisma can own the whole schema without colliding with KubeBlocks'
# own objects in `postgres`. Idempotent: connects with the KubeBlocks account secret
# (so the pod naturally waits for the Cluster to publish it), waits for the server to
# accept connections, then creates the database only if it does not already exist.
apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-db-init
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/component: db-init
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    # Run before the proxy so the target database exists on first boot. Not a hook:
    # a plain resource avoids the PreSync/DB ordering deadlock (the Cluster is created
    # in the same sync).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 30
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: "{{ .Values.dbInit.image.repository }}:{{ .Values.dbInit.image.tag }}"
          imagePullPolicy: {{ .Values.dbInit.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "Waiting for PostgreSQL at ${PGHOST}:5432 ..."
              until pg_isready -h "${PGHOST}" -p 5432 -U "${PGUSER}" >/dev/null 2>&1; do
                sleep 2
              done
              if psql -tAc "SELECT 1 FROM pg_database WHERE datname = '${TARGET_DB}'" | grep -q 1; then
                echo "Database ${TARGET_DB} already exists."
              else
                echo "Creating database ${TARGET_DB} ..."
                psql -c "CREATE DATABASE \"${TARGET_DB}\""
              fi
          env:
            - name: PGHOST
              value: {{ $db.endpoint | quote }}
            - name: PGDATABASE
              value: postgres
            - name: TARGET_DB
              value: {{ $db.database | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ $db.secret.name }}
                  key: {{ $db.secret.usernameKey }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $db.secret.name }}
                  key: {{ $db.secret.passwordKey }}
          resources:
            {{- toYaml .Values.dbInit.resources | nindent 12 }}
{{- end }}
