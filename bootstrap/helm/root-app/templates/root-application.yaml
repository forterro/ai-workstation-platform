{{- with .Values.rootApp }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-root
  namespace: {{ $.Release.Namespace }}
  finalizers:
    # Path-qualified variant (has a `/`) so Kubernetes does not warn about the finalizer name;
    # ArgoCD still cascade-deletes managed resources (background propagation).
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: ai-platform
  source:
    repoURL: {{ .repoURL | quote }}
    targetRevision: {{ .targetRevision | quote }}
    path: {{ .path | quote }}
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $.Release.Namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
