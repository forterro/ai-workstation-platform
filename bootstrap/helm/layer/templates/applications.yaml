{{- $root := . -}}
{{- range .Values.apps }}
{{- $overlay := true -}}
{{- if hasKey . "overlay" }}{{- $overlay = .overlay -}}{{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: {{ $root.Release.Namespace }}
  {{- if .serverSideDiff }}
  annotations:
    # Diff against the server-rendered object so controller-defaulted fields (e.g.
    # KubeBlocks Cluster defaults) do not read as perpetual drift.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  {{- end }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: {{ $root.Values.project | quote }}
  {{- if and $root.Values.configRepoURL $overlay }}
  # Composed: public chart plus this workstation's value overlay.
  sources:
    - repoURL: {{ $root.Values.chartRepoURL | quote }}
      targetRevision: {{ $root.Values.chartRevision | quote }}
      path: {{ .chartPath | quote }}
      helm:
        valueFiles:
          - $values/values/{{ .name }}.yaml
    - repoURL: {{ $root.Values.configRepoURL | quote }}
      targetRevision: {{ $root.Values.configRepoRevision | quote }}
      ref: values
  {{- else }}
  # Standalone (or overlay-less) app: the public chart defaults only.
  source:
    repoURL: {{ $root.Values.chartRepoURL | quote }}
    targetRevision: {{ $root.Values.chartRevision | quote }}
    path: {{ .chartPath | quote }}
  {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- if and $root.Values.configRepoURL .secrets }}
---
# Companion secrets app: deploys the config repo's `secrets/{{ .name }}` kustomization
# (KSOPS-decrypted) into the workload namespace, ahead of the workload (sync-wave -1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}-secrets
  namespace: {{ $root.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: {{ $root.Values.project | quote }}
  source:
    repoURL: {{ $root.Values.configRepoURL | quote }}
    targetRevision: {{ $root.Values.configRepoRevision | quote }}
    path: secrets/{{ .name }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
{{- end }}
