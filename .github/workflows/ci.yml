name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  charts:
    name: Helm lint and render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint charts
        run: |
          set -euo pipefail
          for chart in umbrella-charts/*/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "==> $chart"
              helm lint "$chart"
            fi
          done

      - name: Render layer chart
        run: helm template ai-layer bootstrap/helm/layer >/dev/null
